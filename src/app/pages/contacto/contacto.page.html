<!--
  Template HTML de la página Contacto
  Muestra información de contacto y un formulario con validaciones
  
  LO QUE SE PROGRAMA:
  - Mensajes de error condicionales (solo aparecen si hay error y se intentó enviar)
  - Indicadores visuales de campos inválidos
  - Botón con color dinámico según validez
-->

<ion-header>
  <ion-toolbar color="tertiary">
    <!-- Botón de menú hamburguesa para abrir el side menu -->
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Contacto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- Sección de información de contacto del estudiante -->
  <h2>Información de Contacto</h2>
  <ion-list>
    <ion-item>
      <ion-icon name="call-outline" slot="start"></ion-icon>
      <ion-label>Teléfono: +58 426-5152896</ion-label>
    </ion-item>
    <ion-item>
      <ion-icon name="location-outline" slot="start"></ion-icon>
      <ion-label>Dirección: Caracas, Distrito Capital, Venezuela</ion-label>
    </ion-item>
  </ion-list>

  <!-- 
    FORMULARIO DE CONTACTO CON VALIDACIONES
    LO QUE SE PROGRAMA: validaciones visuales y mensajes de error
  -->
  <h3>Envíanos un mensaje</h3>
  
  <!-- Campo Nombre -->
  <ion-item [class.ion-invalid]="!nombreValido && intentoEnviar">
    <ion-label position="floating">Nombre</ion-label>
    <ion-input [(ngModel)]="nombre"></ion-input>
  </ion-item>
  <!-- 
    Mensaje de error programado: solo aparece si es inválido Y se intentó enviar
    LO QUE SE PROGRAMA: condición *ngIf personalizada
  -->
  <ion-note color="danger" *ngIf="!nombreValido && intentoEnviar">
    El nombre es obligatorio
  </ion-note>

  <!-- Campo Email -->
  <ion-item [class.ion-invalid]="!emailValido && intentoEnviar">
    <ion-label position="floating">Email</ion-label>
    <ion-input type="email" [(ngModel)]="email"></ion-input>
  </ion-item>
  <!-- 
    Mensaje de error programado para email
    LO QUE SE PROGRAMA: validación de formato con expresión regular
  -->
  <ion-note color="danger" *ngIf="!emailValido && intentoEnviar">
    Ingrese un correo electrónico válido
  </ion-note>

  <!-- Campo Mensaje -->
  <ion-item [class.ion-invalid]="!mensajeValido && intentoEnviar">
    <ion-label position="floating">Mensaje</ion-label>
    <ion-textarea [(ngModel)]="mensaje"></ion-textarea>
  </ion-item>
  <!-- 
    Mensaje de error programado para mensaje
    LO QUE SE PROGRAMA: validación de longitud mínima (10 caracteres)
  -->
  <ion-note color="danger" *ngIf="!mensajeValido && intentoEnviar">
    El mensaje debe tener al menos 10 caracteres
  </ion-note>

  <!-- 
    Botón de envío programado:
    - color cambia según validez (success si válido, medium si inválido)
    - al hacer clic ejecuta enviarMensaje() que programé
  -->
  <ion-button 
    expand="block" 
    [color]="formularioValido ? 'success' : 'medium'"
    (click)="enviarMensaje()" 
    class="ion-margin-top">
    <ion-icon name="send-outline" slot="start"></ion-icon>
    Enviar Mensaje
  </ion-button>
</ion-content>
