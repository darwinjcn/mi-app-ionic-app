<!DOCTYPE html>
<html lang="es">
<head>
  <!--
    Archivo index.html principal de la aplicación
    Este archivo es el punto de entrada HTML de la aplicación Ionic
    Aquí se define el título que aparece en la pestaña del navegador
  -->
  <meta charset="utf-8"/>
  
  <!-- 
    Título de la aplicación
    Este texto aparece en la pestaña del navegador y en los marcadores
    Se cambió de "Ionic App" a "MiAppEvaluacion" para identificar correctamente el proyecto
  -->
  <title>MiAppEvaluacion</title>
  
  <base href="/"/>
  <meta name="color-scheme" content="light dark"/>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="format-detection" content="telephone=no"/>
  <meta name="msapplication-tap-highlight" content="no"/>
  <link rel="icon" type="image/png" href="assets/icon/favicon.png"/>
  <meta name="theme-color" content="#1976d2">
</head>
<body>
  <app-root></app-root>
</body>
</html>
